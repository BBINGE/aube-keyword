<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUBE Drone Light Show — 데모</title>
<style>
  :root{
    --aube-mint:#2dd4bf;
    --aube-cyan:#22d3ee;
    --aube-blue:#3b82f6;
    --aube-soft:#7dd3fc;
    --navy-0:#0a1628;
    --navy-1:#0d1f38;
    --navy-2:#13294b;
    --page-bg:#eef4fb;
    --ink:#1e3a5f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--page-bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    color:var(--ink);
    min-height:100vh;
  }

  /* 페이지 전체를 감싸는 무대 — 양옆 거터에 드론쇼가 깔린다 */
  .stage{
    position:relative;
    max-width:1180px;
    margin:0 auto;
    min-height:100vh;
    padding:48px 24px;
  }
  /* 양옆 거터 배경 (딥 네이비) + 캔버스 */
  .gutter-bg{
    position:fixed;
    top:0;
    bottom:0;
    width:max(220px, calc((100vw - 1180px)/2 + 60px));
    pointer-events:none;
    z-index:0;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(45,212,191,.10), transparent 60%),
      linear-gradient(180deg, var(--navy-0), var(--navy-1) 55%, var(--navy-2));
  }
  .gutter-bg.left{left:0; -webkit-mask-image:linear-gradient(90deg,#000 70%,transparent); mask-image:linear-gradient(90deg,#000 70%,transparent);}
  .gutter-bg.right{right:0; -webkit-mask-image:linear-gradient(270deg,#000 70%,transparent); mask-image:linear-gradient(270deg,#000 70%,transparent);}

  #drone{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:1;
    pointer-events:none;
  }

  /* 본문 카드 — 드론쇼 위에 뜬다 */
  .content{
    position:relative;
    z-index:2;
  }
  .panel{
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(6px);
    border:1px solid rgba(59,130,246,.12);
    border-radius:18px;
    padding:28px 32px;
    margin:0 auto 22px;
    max-width:900px;
    box-shadow:0 8px 30px rgba(19,41,75,.06);
  }
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--aube-blue);text-transform:uppercase;}
  h1{font-size:26px;margin:6px 0 4px;color:#0d1f38;}
  h2{font-size:18px;margin:0 0 4px;color:#13294b;}
  p{color:#46618a;font-size:14px;line-height:1.7;margin:8px 0 0;}
  .combo{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
  .cell{border:1px solid rgba(59,130,246,.18);border-radius:14px;padding:16px 18px;}
  .cell .k{font-size:11px;color:#7b93b5;font-weight:700;}
  .cell .v{font-size:18px;color:var(--aube-blue);font-weight:800;margin-top:4px;}
  .cell .s{font-size:11px;color:#9fb2cc;margin-top:4px;}
  .controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(13,31,56,.85);border-radius:999px;padding:8px 14px;display:flex;gap:10px;align-items:center;}
  .controls button{background:rgba(255,255,255,.12);color:#cfe8ff;border:none;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .controls span{color:#9fb2cc;font-size:11px;}
  @media (prefers-reduced-motion: reduce){#drone{display:none;}}
</style>
</head>
<body>
  <div class="gutter-bg left"></div>
  <div class="gutter-bg right"></div>
  <canvas id="drone"></canvas>

  <div class="stage">
    <div class="content">
      <div class="panel" style="text-align:center;">
        <div class="eyebrow">Production Mode · 데모</div>
        <h1>드론 라이트쇼 배경 미리보기</h1>
        <p>빛점들이 날아다니며 심전도 · 십자 · 노드 네트워크 · AUBE 모노그램을 차례로 만들었다 흩어집니다. 약 14초 주기로 반복됩니다.</p>
      </div>
      <div class="panel">
        <div class="eyebrow">키워드 조합 생성</div>
        <h2 style="margin-top:6px;">실제 도구에서는 이 카드들이 드론쇼 위에 뜹니다</h2>
        <div class="combo" style="margin-top:14px;">
          <div class="cell"><div class="k">① 지역</div><div class="v">반송동</div><div class="s">통증 · 척추 · 재활</div></div>
          <div class="cell"><div class="k">② 과목</div><div class="v">신경외과</div><div class="s">병원 유형 연관 과목</div></div>
          <div class="cell"><div class="k">③ 질환 / 증상</div><div class="v">허리디스크</div><div class="s">검색량 높음</div></div>
          <div class="cell"><div class="k">④ 핵심 상품 / 시술</div><div class="v">도수치료</div><div class="s">질환 자동 매칭</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <span id="phase-label">형상: —</span>
    <button id="toggle">일시정지</button>
  </div>

<script>
(function(){
  var canvas=document.getElementById('drone');
  var ctx=canvas.getContext('2d');
  var W,H,DPR;
  var running=true;

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    buildGutterMask();
  }
  window.addEventListener('resize',resize);

  // 양옆 거터 영역만 빛이 진하게, 가운데(본문)는 옅게
  var gutterW;
  function buildGutterMask(){
    gutterW=Math.max(260,( (W-1180)/2 )+90);
  }
  // x좌표가 거터에 얼마나 가까운지(0~1). 가운데일수록 0.
  function gutterWeight(x){
    var l=gutterW, r=W-gutterW;
    if(x<l) return 1 - (x/l)*0.72;        // 왼쪽 거터: 1 → 0.28
    if(x>r) return 1 - ((W-x)/l)*0.72;    // 오른쪽 거터: 1 → 0.28
    return 0.04;                          // 본문 위: 거의 안 보이게
  }

  // ---- 형상(타깃) 생성기 ----
  // 각 형상은 [{x,y}] 점 배열을 반환 (0~1 정규화 좌표, 화면 비율로 매핑)
  function shapeECG(n){
    var pts=[];
    for(var i=0;i<n;i++){
      var t=i/(n-1);
      var x=t;
      var y=0.5;
      var p=(t*6)%1;               // 주기적 심전도
      var seg=Math.floor(t*6);
      if(seg%2===0){
        if(p>0.35&&p<0.45) y=0.5-0.28*Math.sin((p-0.35)/0.10*Math.PI);
        else if(p>=0.45&&p<0.5) y=0.5+0.12;
        else y=0.5;
      }
      pts.push({x:x,y:y});
    }
    return pts;
  }
  function shapeCross(n){
    // 의료 십자
    var pts=[],half=Math.floor(n/2);
    for(var i=0;i<half;i++){var t=i/(half-1);pts.push({x:0.5, y:0.2+0.6*t});}
    for(var j=0;j<n-half;j++){var t2=j/((n-half)-1);pts.push({x:0.2+0.6*t2, y:0.5});}
    return pts;
  }
  function shapeNetwork(n){
    // 노드 네트워크: 격자 위 점 + 약간의 흔들림
    var pts=[],cols=Math.ceil(Math.sqrt(n*1.6)),rows=Math.ceil(n/cols);
    var k=0;
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols&&k<n;c++,k++){
        pts.push({
          x:0.12+0.76*(c/(cols-1||1)),
          y:0.18+0.64*(r/(rows-1||1)),
          node:true
        });
      }
    }
    return pts;
  }
  function shapeWave(n){
    var pts=[];
    for(var i=0;i<n;i++){
      var t=i/(n-1);
      pts.push({x:t, y:0.5+0.18*Math.sin(t*Math.PI*4)});
    }
    return pts;
  }
  function shapeMonogram(n){
    // 단순화된 A (AUBE)
    var pts=[],third=Math.floor(n/3);
    for(var i=0;i<third;i++){var t=i/(third-1);pts.push({x:0.5-0.22*(1-t), y:0.8-0.6*t});} // 왼다리
    for(var j=0;j<third;j++){var t2=j/(third-1);pts.push({x:0.5+0.22*(1-t2), y:0.8-0.6*t2});} // 오른다리
    for(var k=0;k<n-2*third;k++){var t3=k/((n-2*third)-1);pts.push({x:0.4+0.2*t3, y:0.55});} // 가로
    return pts;
  }

  var N=120; // 드론(빛점) 개수
  var shapes=[
    {name:'심전도', fn:shapeECG},
    {name:'노드 네트워크', fn:shapeNetwork},
    {name:'의료 십자', fn:shapeCross},
    {name:'데이터 웨이브', fn:shapeWave},
    {name:'AUBE 모노그램', fn:shapeMonogram}
  ];

  // 빛점 상태
  var drones=[];
  for(var i=0;i<N;i++){
    drones.push({
      x:Math.random(), y:Math.random(),
      tx:Math.random(), ty:Math.random(),
      vx:0, vy:0,
      hue:Math.random(),         // 0=mint,1=cyan 사이
      twk:Math.random()*Math.PI*2,
      node:false,
      // 개별 유영(따로 노는 느낌)을 위한 위상/속도
      driftPhX:Math.random()*Math.PI*2,
      driftPhY:Math.random()*Math.PI*2,
      driftSpX:0.0006+Math.random()*0.0010,
      driftSpY:0.0006+Math.random()*0.0010,
      driftAmp:0.010+Math.random()*0.022,
      ease:0.004+Math.random()*0.004   // 드론마다 다른 반응 속도 → 흩어졌다 모임
    });
  }

  function assignTargets(shapeFn){
    var pts=shapeFn(N);
    // 약간 셔플해서 자연스럽게
    for(var i=0;i<N;i++){
      var p=pts[i%pts.length];
      drones[i].tx=p.x;
      drones[i].ty=p.y;
      drones[i].node=!!p.node;
    }
  }

  var phaseIdx=0;
  var PHASE_MS=5200;        // 형상 하나 유지 시간 (느긋하게)
  var GATHER_MS=2600;       // 형상으로 모이는 구간; 이후엔 천천히 흩어짐
  var lastSwitch=0;
  assignTargets(shapes[0].fn);
  document.getElementById('phase-label').textContent='형상: '+shapes[0].name;

  function colorFor(d,alpha){
    // mint(45,212,191) → cyan(34,211,238) → soft blue(125,211,252)
    var h=d.hue;
    var r,g,b;
    if(h<0.5){var t=h/0.5; r=45+(34-45)*t; g=212+(211-212)*t; b=191+(238-191)*t;}
    else{var t2=(h-0.5)/0.5; r=34+(125-34)*t2; g=211+(211-211)*t2; b=238+(252-238)*t2;}
    return 'rgba('+(r|0)+','+(g|0)+','+(b|0)+','+alpha+')';
  }

  var t0=performance.now();
  function frame(now){
    var dt=Math.min(40, now-(frame._last||now)); frame._last=now;
    var phaseT=now-lastSwitch;        // 현재 형상에 들어온 뒤 경과
    var gathering=phaseT<GATHER_MS;   // 모이는 중인지, 흩어지는 중인지
    if(running){
      // 형상 전환
      if(phaseT>PHASE_MS){
        lastSwitch=now;
        phaseIdx=(phaseIdx+1)%shapes.length;
        assignTargets(shapes[phaseIdx].fn);
        document.getElementById('phase-label').textContent='형상: '+shapes[phaseIdx].name;
      }
    }
    ctx.clearRect(0,0,W,H);
    var isNet=shapes[phaseIdx].name==='노드 네트워크';

    for(var i=0;i<N;i++){
      var d=drones[i];
      if(running){
        // 개별 유영(따로 노는 떠다님)
        d.driftPhX+=d.driftSpX*dt;
        d.driftPhY+=d.driftSpY*dt;
        var driftX=Math.cos(d.driftPhX)*d.driftAmp;
        var driftY=Math.sin(d.driftPhY)*d.driftAmp;

        if(gathering){
          // 형상으로 천천히 수렴 (드론마다 ease가 달라 흩어졌다 모임)
          var dx=(d.tx+driftX*0.4)-d.x, dy=(d.ty+driftY*0.4)-d.y;
          d.vx=(d.vx+dx*d.ease)*0.90;
          d.vy=(d.vy+dy*d.ease)*0.90;
        }else{
          // 흩어짐: 인력 풀고 유영만 — 느리게 떠다닌다
          d.vx=(d.vx*0.94)+driftX*0.0016;
          d.vy=(d.vy*0.94)+driftY*0.0016;
        }
        d.x+=d.vx; d.y+=d.vy;
        // 화면 밖으로 안 나가게 부드럽게 가둠
        if(d.x<-0.02)d.vx+=0.0008; if(d.x>1.02)d.vx-=0.0008;
        if(d.y<-0.02)d.vy+=0.0008; if(d.y>1.02)d.vy-=0.0008;
        d.twk+=0.022;   // 반짝임도 더 느리게
      }
      var px=d.x*W, py=d.y*H;
      var gw=gutterWeight(px);
      var twinkle=0.55+0.45*Math.sin(d.twk);
      // 모일 때 살짝 또렷, 흩어질 때 더 옅게 — 전체적으로 은은
      var phaseAlpha=gathering?0.62:0.42;
      var baseA=(0.10+0.46*gw)*twinkle*phaseAlpha;

      // 연결선 (노드 네트워크 + 거터에서만, 모이는 중에만)
      if(isNet && gathering && gw>0.55){
        for(var j=i+1;j<i+5&&j<N;j++){
          var e=drones[j];
          var ex=e.x*W, ey=e.y*H;
          var dist=Math.hypot(ex-px,ey-py);
          if(dist<90){
            ctx.strokeStyle=colorFor(d,(0.07*gw)*(1-dist/90));
            ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(ex,ey);ctx.stroke();
          }
        }
      }

      var rad=d.node?3.0:1.9;
      var g=ctx.createRadialGradient(px,py,0,px,py,rad*5);
      g.addColorStop(0,colorFor(d,baseA));
      g.addColorStop(1,colorFor(d,0));
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(px,py,rad*5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=colorFor(d,Math.min(0.8,baseA+0.18));
      ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  resize();
  requestAnimationFrame(frame);

  document.getElementById('toggle').addEventListener('click',function(){
    running=!running;
    this.textContent=running?'일시정지':'재생';
    if(running)lastSwitch=performance.now();
  });
})();
</script>
</body>
</html>
